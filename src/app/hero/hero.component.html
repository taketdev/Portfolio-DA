<section class="hero">
  <div class="hero-container">
    <div class="hero-content">
      <div class="hero-text">
        <h1 class="hero-title">

          <span class="greeting">Hello there! I'm</span>
          <span class="name">Max Leyh</span>
        </h1>
        <h2 class="hero-subtitle">FRONTEND DEVELOPER</h2>
        <div class="hero-actions">
          <a href="#contact" class="cta-button">Get in Touch</a>
        </div>
        
        <!-- Scroll Down Button -->
        <div class="scroll-down">
          <a href="#about" class="scroll-down-link">
            <img src="../../assets/hero/scrolldownCircle.svg" alt="" class="scroll-circle">
            <img src="../../assets/hero/scrollDown Arrow.svg" alt="Scroll Down" class="scroll-arrow">
          </a>
        </div>
      </div>
      
      <div class="hero-image-wrapper">
        <div class="hero-circle-bg">
          <img src="../../assets/hero/heroCircle.svg" alt="" class="hero-circle">
        </div>
        <img src="../../assets/hero/Photo.svg" alt="Max Leyh" class="hero-photo">
      </div>
    </div>

    <!-- Vertical Scroll Indicator (positioned right in CSS) -->
    <div class="scroll-indicator">
      <img src="../../assets/hero/scrollBar.svg" alt="Scroll">
    </div>
  </div>
</section>

<section class="skills" id="skills">
  <div class="skills-container">
    <div class="skills-content-top">
      <div class="header-section">
        <h2 class="section-title">{{ 'skills.title' | translate }}</h2>
        <div class="description-box">
          <p>
            {{ 'skills.description' | translate }}
          </p>
        </div>
      </div>
    </div>

    <div class="skills-content-bottom">
      <div class="decor-wrapper">
        <img src="../../assets/skills/CapaCircle.svg" alt="" class="capa-circle">
        <div class="emoji-wrapper">
          <img src="../../assets/skills/LearningEmoji.svg" alt="" class="learning-emoji">
          <div class="info-overlay">
            <h3 class="overlay-title">{{ 'skills.missingTitle' | translate }}</h3>
            <p class="overlay-text">{{ 'skills.missingText' | translate }}</p>
            <div class="skills-icons">
              <div class="skill-icon-item">
                <img src="../../assets/skills/React.svg" alt="React">
                <span>React</span>
              </div>
              <div class="skill-icon-item">
                <img src="../../assets/skills/Vuejs.svg" alt="Vue">
                <span>Vue</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="skills-grid">
        @for (skill of skills; track skill.name) {
          <div class="skill-item">
            <div class="skill-icon-wrapper">
              <img [src]="'../../assets/skills/' + skill.icon" [alt]="skill.name" class="skill-icon">
            </div>
            <span class="skill-name">{{ skill.name }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</section>

<div class="menu-box" [class.open]="scrollService.isMenuOpen()">
  <div class="menu-header">
    <span class="menu-title">{{ 'header.menu' | translate }}</span>
    <div class="close-button" (click)="closeMenu()">
      <img src="../../assets/menu/close.svg" alt="Close" class="icon-default">
      <img src="../../assets/menu/closeHover.svg" alt="Close" class="icon-hover">
    </div>
  </div>

  <nav class="menu-nav">
    <ul class="nav-list">
      <li class="nav-item">
        <a (click)="scrollToSection(1)">{{ 'header.about' | translate }}</a>
      </li>
      <li class="nav-item">
        <a (click)="scrollToSection(2)">{{ 'header.skills' | translate }}</a>
      </li>
      <li class="nav-item">
        <a (click)="scrollToSection(3)">{{ 'header.projects' | translate }}</a>
      </li>
      <li class="nav-item">
        <a (click)="scrollToSection(4)">{{ 'header.contact' | translate }}</a>
      </li>
    </ul>
  </nav>

  <div class="menu-social">
    <a [href]="socialLinks.github" target="_blank" rel="noopener noreferrer">
      <img src="../../assets/menu/socialIcons/Github black.svg" alt="GitHub">
    </a>
    <a [href]="socialLinks.linkedin" target="_blank" rel="noopener noreferrer">
      <img src="../../assets/menu/socialIcons/LinkedIn black.svg" alt="LinkedIn">
    </a>
    <a [href]="socialLinks.email" target="_blank" rel="noopener noreferrer">
      <img src="../../assets/menu/socialIcons/mail black.svg" alt="Email">
    </a>
  </div>
</div>

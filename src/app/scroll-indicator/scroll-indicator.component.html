<div class="scroll-indicator-wrapper" *ngIf="hasMain()">
  <button class="arrow-btn" *ngIf="activeSection() === 4">
    <img src="assets/scrollIndicator/arrowButton%20Long.svg" alt="" class="arrow-img">
  </button>
  <span class="arrow-underscore" *ngIf="activeSection() === 4"></span>
  <div class="scroll-indicator" [class.light-theme]="activeSection() < 2" [class.dark-theme]="activeSection() >= 2 && activeSection() < 4" [class.dark-theme-last]="activeSection() >= 4">
    <div class="indicator-row" *ngFor="let point of [0,1,2,3,4]; let i = index">
      <img [src]="getPointSrc(i)" alt="" class="point" [class.active]="isActive(i)" (click)="scrollToSection(i)" style="cursor: pointer">
    </div>
  </div>
</div>
